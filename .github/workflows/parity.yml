name: Parity Tests

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - name: Install Python deps
        run: python -m pip install --upgrade pip pandas
      - name: Clone metasalmon
        run: git clone https://github.com/DFO-PacSci/metasalmon /tmp/metasalmon
      - name: Install metasalmon
        run: R CMD INSTALL /tmp/metasalmon -l /tmp/metasalmon-lib
      - name: Run parity test (R↔Python)
        env:
          R_LIBS: /tmp/metasalmon-lib
        run: PYTHONPATH=. python -m unittest tests.test_roundtrip
